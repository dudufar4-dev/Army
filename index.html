<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס אמצעי נשק ואופטיקה — ריחן 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    direction: rtl;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: #888;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid #f0ede8;
  }

  .top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
  }

  input[type="text"] {
    width: 100%;
    border: 1px solid #e0ddd8;
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 14px;
    color: #1a1a1a;
    background: #faf9f7;
    font-family: inherit;
    direction: rtl;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: #4a6fa5;
    background: #fff;
  }

  .q-text {
    font-size: 13px;
    color: #333;
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .answer-inline {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .answer-inline label {
    font-size: 13px;
    color: #888;
    white-space: nowrap;
  }

  .answer-inline input {
    max-width: 120px;
  }

  .soldier-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f5f4f0;
  }

  .soldier-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .row-num {
    font-size: 12px;
    color: #bbb;
    min-width: 20px;
    text-align: left;
  }

  .soldier-row input[type="text"] {
    flex: 1;
  }

  .hand-group {
    display: flex;
    gap: 12px;
  }

  .hand-group label {
    font-size: 12px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    white-space: nowrap;
  }

  input[type="radio"] {
    accent-color: #4a6fa5;
    cursor: pointer;
  }

  .cmdr-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f5f4f0;
  }

  .cmdr-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .btn-submit {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    margin-top: 0.5rem;
    transition: background 0.15s;
  }

  .btn-submit:hover { background: #333; }
  .btn-submit:active { background: #000; }

  .summary-section {
    display: none;
    margin-top: 1.5rem;
  }

  .summary-section h2 {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 0.75rem;
  }

  .summary-box {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    font-size: 13px;
    line-height: 2;
    color: #1a1a1a;
    white-space: pre-wrap;
    direction: rtl;
  }

  .btn-copy {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #1a1a1a;
    border: 1px solid #e0ddd8;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    margin-top: 0.75rem;
    transition: background 0.15s;
  }

  .btn-copy:hover { background: #faf9f7; }

  .btn-reset {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: #aaa;
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 0.5rem;
  }

  .btn-reset:hover { color: #555; }

  @media (max-width: 500px) {
    .top-grid { grid-template-columns: 1fr; }
    .hand-group { flex-direction: column; gap: 6px; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .btn-submit, .btn-copy, .btn-reset { display: none; }
    .summary-section { display: block !important; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>טופס אמצעי נשק ואופטיקה</h1>
    <p>ריחן 2026</p>
  </header>

  <div class="top-grid">
    <div class="field">
      <label>שם הממלא</label>
      <input type="text" id="fname" placeholder="שם מלא">
    </div>
    <div class="field">
      <label>פלוגה</label>
      <input type="text" id="fcompany" placeholder="שם הפלוגה">
    </div>
  </div>

  <div class="card">
    <p class="q-text">מבין החיילים המקבלים מיקרו תבור (ללא קלעים ומטוליסטים), כמה הם שמאליים?</p>
    <div class="answer-inline">
      <label>תשובה:</label>
      <input type="text" id="lefties" placeholder="מספר">
    </div>
  </div>

  <div class="card">
    <p class="card-title">קלעים — 6 חיילים &nbsp;|&nbsp; טריגקון + אקילה</p>
    <div id="sharp"></div>
  </div>

  <div class="card">
    <p class="card-title">מטוליסטים — 6 חיילים &nbsp;|&nbsp; זאבון + מפרולייט</p>
    <div id="launch"></div>
  </div>

  <div class="card">
    <p class="card-title">מפקדים / סמלים — 3 &nbsp;|&nbsp; כוונת מפרולייט</p>
    <div id="cmdrs"></div>
  </div>

  <div class="card">
    <p class="card-title">כוונת MARS — 4 אנשים &nbsp;|&nbsp; 3 ממים + סמפ</p>
    <div id="mars"></div>
  </div>

  <button class="btn-submit" onclick="buildSummary()">הצג סיכום</button>
  <button class="btn-reset" onclick="resetForm()">נקה טופס</button>

  <div class="summary-section" id="summary-section">
    <h2>סיכום הטופס</h2>
    <div class="summary-box" id="summary-box"></div>
    <button class="btn-copy" onclick="copyText()">העתק סיכום</button>
  </div>
</div>

<script>
function makeRows(id, count, withHand) {
  const c = document.getElementById(id);
  for (let i = 1; i <= count; i++) {
    const d = document.createElement('div');
    d.className = withHand ? 'soldier-row' : 'cmdr-row';
    let hand = withHand ? `<div class="hand-group">
      <label><input type="radio" name="${id}h${i}" value="ימני"> ימני</label>
      <label><input type="radio" name="${id}h${i}" value="שמאלי"> שמאלי</label>
    </div>` : '';
    d.innerHTML = `<span class="row-num">${i}</span>
      <input type="text" placeholder="שם ושם משפחה">${hand}`;
    c.appendChild(d);
  }
}

makeRows('sharp', 6, true);
makeRows('launch', 6, true);
makeRows('cmdrs', 3, false);
makeRows('mars', 4, false);

function getSoldiers(id, count, withHand) {
  const inputs = document.querySelectorAll(`#${id} input[type="text"]`);
  return Array.from({length: count}, (_, i) => {
    const name = inputs[i]?.value.trim() || '—';
    let hand = '';
    if (withHand) {
      const r = document.querySelector(`input[name="${id}h${i+1}"]:checked`);
      hand = r ? ` (${r.value})` : ' (לא סומן)';
    }
    return `  ${i+1}. ${name}${hand}`;
  }).join('\n');
}

function buildSummary() {
  const name = document.getElementById('fname').value.trim() || '—';
  const comp = document.getElementById('fcompany').value.trim() || '—';
  const left = document.getElementById('lefties').value.trim() || '—';

  const text =
`ממלא: ${name}   |   פלוגה: ${comp}
שמאליים (מיקרו תבור): ${left}

קלעים (טריגקון + אקילה):
${getSoldiers('sharp', 6, true)}

מטוליסטים (זאבון + מפרולייט):
${getSoldiers('launch', 6, true)}

מפקדים / סמלים (מפרולייט):
${getSoldiers('cmdrs', 3, false)}

כוונת MARS (3 ממים + סמפ):
${getSoldiers('mars', 4, false)}`;

  document.getElementById('summary-box').textContent = text;
  const sec = document.getElementById('summary-section');
  sec.style.display = 'block';
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText() {
  const t = document.getElementById('summary-box').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const btn = event.target;
    btn.textContent = '✓ הועתק בהצלחה!';
    setTimeout(() => { btn.textContent = 'העתק סיכום'; }, 2500);
  });
}

function resetForm() {
  if (!confirm('לנקות את כל הטופס?')) return;
  document.querySelectorAll('input[type="text"]').forEach(i => i.value = '');
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById('summary-section').style.display = 'none';
}
</script>
</body>
</html>
